name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Determine version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore KenticoSentinel.slnx

      - name: Build
        run: dotnet build KenticoSentinel.slnx --configuration Release --no-restore -p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: dotnet test KenticoSentinel.slnx --configuration Release --no-build --verbosity minimal

      - name: Pack Core library
        run: dotnet pack src/KenticoSentinel.Core/KenticoSentinel.Core.csproj --configuration Release --no-build -p:Version=${{ steps.ver.outputs.version }} --output ./artifacts

      - name: Pack CLI tool
        run: dotnet pack src/KenticoSentinel/KenticoSentinel.csproj --configuration Release --no-build -p:Version=${{ steps.ver.outputs.version }} --output ./artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set."
            exit 1
          fi
          dotnet nuget push "./artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ./artifacts/*.nupkg
