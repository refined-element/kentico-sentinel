name: Claude Code Review

on:
  pull_request:
    # 'synchronize' re-runs the review on every subsequent push to an already-open PR so the
    # posted review doesn't go stale after the first fix pass. 'ready_for_review' picks up
    # drafts flipped to open, which wouldn't fire on just 'opened'/'reopened'.
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  review:
    # Skip fork PRs — secrets.CLAUDE_CODE_OAUTH_TOKEN is intentionally unavailable in the
    # fork context and running here would fail noisily. Maintainers can still opt-in by
    # running the mention-based claude.yml workflow from a trusted branch after review.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '["claude"]'
